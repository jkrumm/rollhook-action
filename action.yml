name: 'RollHook Deploy'
description: 'Trigger a zero-downtime rolling deployment via RollHook with real-time log streaming'
branding:
  icon: 'upload-cloud'
  color: 'blue'
inputs:
  url:
    description: 'RollHook server base URL (e.g. https://deploy.example.com)'
    required: true
  token:
    description: 'RollHook webhook token (used for POST /deploy)'
    required: true
  admin_token:
    description: 'RollHook admin token (used for GET /jobs and SSE log streaming). Defaults to token if not provided — set this when using separate webhook/admin tokens.'
    required: false
  app:
    description: 'App name in rollhook.config.yaml. Defaults to the current GitHub repo name.'
    required: false
    default: ${{ github.event.repository.name }}
  image_tag:
    description: 'Docker image tag to deploy'
    required: true
  timeout:
    description: 'Max seconds to wait for deployment to complete'
    required: false
    default: '600'
outputs:
  job_id:
    description: 'RollHook job ID'
  status:
    description: 'Final deployment status (success or failed)'
runs:
  using: 'node20'
  main: 'dist/index.js'
