name: 'RollHook Deploy'
description: 'Zero-secret zero-downtime deployment via RollHook — build, push, and deploy in one step using GitHub OIDC'
branding:
  icon: 'upload-cloud'
  color: 'blue'
inputs:
  url:
    description: 'RollHook server base URL (e.g. https://deploy.example.com)'
    required: true
  image_name:
    description: 'Image name (without registry prefix or tag), e.g. myapp'
    required: true
  dockerfile:
    description: 'Path to Dockerfile'
    required: false
    default: 'Dockerfile'
  context:
    description: 'Docker build context path'
    required: false
    default: '.'
  timeout:
    description: 'Max seconds to wait for deployment to complete'
    required: false
    default: '600'
outputs:
  job_id:
    description: 'RollHook job ID'
  status:
    description: 'Final deployment status (success or failed)'
runs:
  using: 'node24'
  main: 'dist/index.js'
