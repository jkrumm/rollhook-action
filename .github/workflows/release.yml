name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - run: npm ci

      # Rebuild dist before semantic-release so the release commit always
      # contains a dist/index.js that matches the source at that tag.
      - name: Build dist
        run: npm run build

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: Johannes Krumm
          GIT_AUTHOR_EMAIL: jkrumm@users.noreply.github.com
          GIT_COMMITTER_NAME: Johannes Krumm
          GIT_COMMITTER_EMAIL: jkrumm@users.noreply.github.com
        run: |
          npx -p semantic-release@25 \
            -p @semantic-release/changelog@6 \
            -p @semantic-release/git@10 \
            -p @semantic-release/github@12 \
            -p conventional-changelog-conventionalcommits@9 \
            semantic-release

      # Keep the floating major tag (v1, v2, …) pointing at the latest release
      # so users can pin to a major version with uses: jkrumm/rollhook-action@v1.
      - name: Update floating major version tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags --force
          # Find the tag pointing at HEAD — only present when semantic-release
          # just created a new release (chore/ci commits produce no tag).
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "")
          if [ -z "$TAG" ]; then
            echo "No new release — skipping floating tag update"
            exit 0
          fi
          MAJOR=$(echo "$TAG" | sed 's/\..*//')   # v1.2.3 → v1
          SHA=$(git rev-parse "$TAG^{}")           # dereference annotated tag to commit sha
          echo "Updating $MAJOR → $TAG ($SHA)"
          gh api --method DELETE "/repos/${{ github.repository }}/git/refs/tags/$MAJOR" 2>/dev/null || true
          gh api --method POST "/repos/${{ github.repository }}/git/refs" \
            -f "ref=refs/tags/$MAJOR" \
            -f "sha=$SHA"
